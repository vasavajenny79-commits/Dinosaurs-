<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Marry Me, Patel? 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --bg: #fff5f7; }
        body { margin: 0; background: var(--bg); font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        
        .container { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 40px; box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2); width: 85%; z-index: 10; border: 2px solid white; }
        
        h1 { font-family: 'Dancing Script', cursive; color: var(--p); font-size: 2.5rem; margin: 0; }
        .sub { color: #666; font-style: italic; margin: 10px 0 20px; font-size: 1.1rem; }

        .heart-box { height: 140px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .main-heart { background-color: var(--p); height: 70px; width: 70px; position: relative; transform: rotate(-45deg); animation: beat 0.8s infinite alternate; }
        .main-heart:before, .main-heart:after { content: ""; background-color: var(--p); border-radius: 50%; height: 70px; width: 70px; position: absolute; }
        .main-heart:before { top: -35px; left: 0; }
        .main-heart:after { left: 35px; top: 0; }

        @keyframes beat { 0% { transform: rotate(-45deg) scale(1); } 100% { transform: rotate(-45deg) scale(1.2); } }

        .buttons { margin-top: 20px; display: flex; justify-content: center; gap: 15px; min-height: 100px; align-items: center; position: relative; }
        button { padding: 14px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #yesBtn { background: var(--p); color: white; z-index: 100; }
        #noBtn { background: #f8f9fa; color: var(--p); position: relative; }

        .falling { position: fixed; top: -50px; animation: fall linear forwards; z-index: 1; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        
        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--p); color: white; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: 0.5s; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/05/Serenade-to-Spring.mp3" type="audio/mpeg">
    </audio>

    <div id="screen1" class="container">
        <h1>Will You Marry Me, Patel? 💖</h1>
        <p class="sub">Will you make me a Patel too? 🥺💍</p>
        
        <div class="heart-box">
            <div class="main-heart" id="heartElement"></div>
        </div>

        <div class="buttons">
            <button id="yesBtn">Yes 💕</button>
            <button id="noBtn">No 😢</button>
        </div>
    </div>

    <div id="screen2" class="container hidden">
        <h1 style="font-size: 3rem;">I KNEW IT! 💋</h1>
        <p>You've made me the happiest person! 😘</p>
        <div style="font-size: 4rem; margin: 20px 0;">💍💌✨</div>
        <div style="font-size: 2.5rem;">💋😘💌</div>
    </div>

    <div id="toast"></div>

    <script>
        const no = document.getElementById('noBtn');
        const yes = document.getElementById('yesBtn');
        const heart = document.getElementById('heartElement');
        const music = document.getElementById('music');
        const toast = document.getElementById('toast');
        let count = 0;

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 2000);
        }

        function rain(emoji) {
            const e = document.createElement('div');
            e.className = 'falling';
            e.innerHTML = emoji;
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = Math.random() * 20 + 20 + 'px';
            e.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 4000);
        }

        setInterval(() => rain('❤️'), 700);

        no.addEventListener('click', () => {
            count++;
            music.play().catch(()=>{});

            if(count === 1) { 
                no.innerText = "Are you sure? 🥺"; 
                showToast("Please rethink... 🥺");
            } 
            else if(count === 2) { 
                no.innerText = "Really sure? 😭"; 
                showToast("Please don't say no! 💔");
                heart.style.animationDuration = "0.4s"; 
            } 
            else if(count === 3) {
                no.innerText = "Think again! 💔";
                showToast("Don't break my heart... 😭");
                heart.style.animationDuration = "0.2s"; 
            }
            else {
                no.innerText = "Catch me! 😜";
                no.style.position = 'fixed';
                no.style.left = Math.random() * (window.innerWidth - 120) + 'px';
                no.style.top = Math.random() * (window.innerHeight - 50) + 'px';
                showToast("Bhag raha hoon! 🏃‍♂️💨");
            }
            yes.style.transform = `scale(${1 + count * 0.4})`;
        });

        yes.addEventListener('click', () => {
            // Challenge: Patel must click 'No' at least once
            if(count < 1) {
                showToast("Arey! Pehle thoda nakhre toh dikhao! 😂");
            } else if(count < 3) {
                showToast("Pehle thoda aur manao! 🥺");
            } else {
                document.getElementById('screen1').classList.add('hidden');
                document.getElementById('screen2').classList.remove('hidden');
                document.body.style.background = "#e6fffa"; 
                setInterval(() => rain('🌸'), 150);
                setInterval(() => rain('💋'), 200);
            }
        });
    </script>
</body>
</html>
