<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Marry Me? 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --bg: #fff0f3; }
        body { margin: 0; background: var(--bg); font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; z-index: 10; position: relative; }
        
        h1 { font-family: 'Dancing Script', cursive; color: var(--p); font-size: 2.2rem; }

        /* --- CSS ANIMATED HEART (No Image Needed) --- */
        .heart-box { height: 150px; display: flex; justify-content: center; align-items: center; position: relative; }
        .main-heart { background-color: var(--p); height: 80px; width: 80px; position: relative; transform: rotate(-45deg); animation: beat 0.8s infinite alternate; }
        .main-heart:before, .main-heart:after { content: ""; background-color: var(--p); border-radius: 50%; height: 80px; width: 80px; position: absolute; }
        .main-heart:before { top: -40px; left: 0; }
        .main-heart:after { left: 40px; top: 0; }

        @keyframes beat { 0% { transform: rotate(-45deg) scale(1); } 100% { transform: rotate(-45deg) scale(1.2); } }

        .buttons { margin-top: 30px; display: flex; justify-content: center; gap: 15px; min-height: 100px; }
        button { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #yesBtn { background: var(--p); color: white; }
        #noBtn { background: #eee; color: #555; position: relative; }

        /* Falling Emoji Rain */
        .falling { position: fixed; top: -50px; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/05/Serenade-to-Spring.mp3" type="audio/mpeg">
    </audio>

    <div id="screen1" class="container">
        <h1>Will You Marry Me, Patel? 💖</h1>
        <div class="heart-box"><div class="main-heart" id="heartElement"></div></div>
        <div class="buttons">
            <button id="yesBtn">Yes 💕</button>
            <button id="noBtn">No 😢</button>
        </div>
    </div>

    <div id="screen2" class="container hidden">
        <h1 style="font-size: 3rem;">YAYYY! 💋</h1>
        <p>I Love You Forever! 😘</p>
        <div style="font-size: 5rem;">💍💌✨</div>
    </div>

    <script>
        const no = document.getElementById('noBtn');
        const yes = document.getElementById('yesBtn');
        const heart = document.getElementById('heartElement');
        const music = document.getElementById('music');
        let count = 0;

        function rain(emoji) {
            const e = document.createElement('div');
            e.className = 'falling';
            e.innerHTML = emoji;
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = Math.random() * 20 + 20 + 'px';
            e.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 4000);
        }
        setInterval(() => rain('❤️'), 500);

        no.addEventListener('click', () => {
            count++;
            music.play().catch(()=>{});
            if(count === 1) { no.innerText = "Sure? 🥺"; heart.style.backgroundColor = "#ff85a1"; }
            else if(count === 2) { no.innerText = "Plz... 😭"; heart.style.animationDuration = "0.3s"; }
            else {
                no.style.position = 'fixed';
                no.style.left = Math.random() * 80 + 'vw';
                no.style.top = Math.random() * 80 + 'vh';
            }
            yes.style.transform = `scale(${1 + count * 0.4})`;
        });

        yes.addEventListener('click', () => {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            setInterval(() => rain('🌸'), 100);
            setInterval(() => rain('💋'), 150);
        });
    </script>
</body>
</html>
